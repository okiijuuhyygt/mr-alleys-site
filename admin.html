<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>· · ·</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: "Cubic 11";
  src: url("assets/Cubic_11_1.013_R.ttf") format("truetype");
  font-display: swap;
}

:root {
  --paper:        #f3ead4;
  --paper-soft:   #ede2c4;
  --paper-edge:   #c9b88c;
  --ink:          #2a1f12;
  --ink-soft:     #5e4a30;
  --ink-mute:     #8a7556;
  --brass:        #b8801f;
  --brass-light:  #d4a13a;
  --brass-deep:   #6e4d10;
  --avail:        #4a8b3a;
  --danger:       #b83a2a;
  --rule:         #c9b88c;

  --pixel-en: "Press Start 2P", monospace;
  --pixel-tc: "Cubic 11", "Noto Sans TC", monospace;
  --mono:     "VT323", monospace;
  --sans:     "Noto Sans TC", "PingFang TC", sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
  background-image: radial-gradient(circle, rgba(42,31,18,0.08) 1px, transparent 1.5px);
  background-size: 16px 16px;
}

/* Top bar */
.top-bar {
  position: sticky; top: 0; z-index: 50;
  background: var(--ink); color: var(--paper);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--pixel-en);
  font-size: 10px;
  letter-spacing: 0.15em;
  border-bottom: 4px solid var(--brass);
}
.top-bar .left { display: flex; align-items: center; gap: 12px; }
.top-bar .logo { color: var(--brass-light); }
.top-bar .badge {
  background: var(--brass); color: var(--paper);
  padding: 4px 8px; font-size: 9px;
}
.top-bar a, .top-bar button {
  color: var(--paper); background: transparent; border: 1px solid var(--paper-edge);
  padding: 5px 10px; font-family: var(--pixel-en); font-size: 9px;
  cursor: pointer; text-decoration: none;
  letter-spacing: 0.1em;
}
.top-bar a:hover, .top-bar button:hover { background: var(--brass); border-color: var(--brass); }
.hidden { display: none !important; }

.wrap { max-width: 800px; margin: 0 auto; padding: 32px 20px 120px; }

h1 {
  font-family: var(--pixel-tc);
  font-size: 28px; font-weight: 400;
  color: var(--ink); margin: 0 0 8px;
  text-shadow: 3px 3px 0 var(--brass-light);
  -webkit-font-smoothing: none;
}
.lead {
  font-family: var(--mono);
  font-size: 18px; color: var(--ink-soft);
  margin: 0 0 28px;
}

/* Login */
#sceneLogin .btn-link {
  display: inline-block; margin-bottom: 18px;
  padding: 10px 16px; background: var(--paper-soft);
  border: 3px solid var(--ink); color: var(--ink);
  text-decoration: none;
  font-family: var(--pixel-en); font-size: 10px; letter-spacing: 0.1em;
  box-shadow: 4px 4px 0 var(--ink);
}
#sceneLogin .btn-link:hover { background: var(--brass); color: var(--paper); }

#loginForm {
  display: block;
  background: transparent; border: none; box-shadow: none;
  padding: 0; margin: 0;
}
.error { color: var(--danger); font-family: var(--mono); font-size: 17px; margin-top: 8px; }
.help-list { font-family: var(--mono); font-size: 16px; color: var(--ink-soft); padding-left: 20px; }
.help-list li { margin: 4px 0; }
code.tok-eg { background: var(--paper-soft); padding: 2px 6px; border: 1px solid var(--paper-edge); }

/* Editor panels */
.panel {
  background: var(--paper-soft);
  border: 3px solid var(--ink);
  padding: 0;
  margin-bottom: 18px;
  box-shadow: 4px 4px 0 var(--ink);
}
.panel summary {
  list-style: none;
  padding: 16px 22px;
  cursor: pointer;
  font-family: var(--pixel-en);
  font-size: 11px; letter-spacing: 0.18em;
  color: var(--ink); text-transform: uppercase;
  background: var(--paper);
  border-bottom: 2px solid var(--ink);
  display: flex; justify-content: space-between; align-items: center;
}
.panel summary::-webkit-details-marker { display: none; }
.panel summary::after { content: "▼"; font-size: 10px; color: var(--brass); }
.panel[open] summary::after { content: "▲"; }
.panel summary:hover { background: var(--paper-edge); }
.panel .panel-body { padding: 22px; }

.field { margin-bottom: 16px; }
.field label {
  display: block; margin-bottom: 6px;
  font-family: var(--pixel-en); font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--brass-deep); text-transform: uppercase;
}
.field .hint {
  font-family: var(--mono); font-size: 14px;
  color: var(--ink-mute); margin-top: 4px;
}
.field input, .field textarea, .field select {
  width: 100%;
  font-family: var(--mono); font-size: 18px;
  padding: 10px 12px;
  border: 2px solid var(--ink); background: white;
  color: var(--ink);
}
.field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }

/* Service card editor */
.service-block {
  background: var(--paper);
  border: 2px dashed var(--ink);
  padding: 18px; margin-bottom: 16px;
}
.service-block-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 1px solid var(--paper-edge);
}
.service-block-head .code {
  font-family: var(--pixel-en); font-size: 9px;
  letter-spacing: 0.2em; color: var(--brass);
}
.service-block-head .label {
  font-family: var(--pixel-tc); font-size: 18px;
  color: var(--ink); -webkit-font-smoothing: none;
}

/* Save bar (sticky bottom) */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink); color: var(--paper);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 4px solid var(--brass);
  z-index: 30;
}
.save-bar #saveInfo { font-family: var(--mono); font-size: 17px; }
.save-bar #btnSave {
  font-family: var(--pixel-en); font-size: 11px; letter-spacing: 0.1em;
  background: var(--brass); color: var(--paper);
  border: 2px solid var(--brass-light);
  padding: 12px 22px; cursor: pointer;
  box-shadow: 3px 3px 0 var(--brass-deep);
}
.save-bar #btnSave:hover:not(:disabled) { background: var(--brass-light); color: var(--ink); }
.save-bar #btnSave:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; }

#loadingContent {
  font-family: var(--mono); font-size: 18px;
  color: var(--ink-soft); padding: 40px 20px; text-align: center;
}

/* Quick reference */
.quick-ref {
  background: var(--paper-soft);
  border: 2px solid var(--brass);
  padding: 14px 18px; margin-bottom: 18px;
  font-family: var(--mono); font-size: 16px;
}
.quick-ref strong {
  font-family: var(--pixel-en); font-size: 9px;
  letter-spacing: 0.15em; color: var(--brass-deep);
  text-transform: uppercase;
}
.quick-ref a {
  color: var(--brass-deep); word-break: break-all;
}

/* ============ Dialog frame (login card, mr-alleys palette) ============ */
#sceneLogin { display: flex; justify-content: center; align-items: flex-start; }
.dialog-frame {
  position: relative;
  width: 100%;
  max-width: 420px;
  margin: 56px auto 24px;
  padding: 40px 28px 32px;
  background: var(--paper);
  border: 3px solid var(--ink);
  box-shadow: 6px 6px 0 var(--paper-edge);
  text-align: center;
}
.dialog-frame__deco {
  position: absolute;
  top: -18px; left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 32px;
  background: var(--brass-light);
  border: 3px solid var(--ink);
  display: block;
  image-rendering: pixelated;
}
.dialog-frame__deco::before,
.dialog-frame__deco::after {
  content: "";
  position: absolute;
  background: var(--ink);
}
.dialog-frame__deco::before {
  top: 28%; left: 36%;
  width: 28%; height: 18%;
}
.dialog-frame__deco::after {
  bottom: 22%; left: 42%;
  width: 16%; height: 28%;
}
.dialog-frame__title {
  font-family: var(--pixel-tc);
  font-weight: 400;
  font-size: 26px;
  color: var(--ink);
  letter-spacing: 6px;
  padding-left: 6px;
  margin: 14px 0 6px;
  line-height: 1.4;
  -webkit-font-smoothing: none;
  text-shadow: 3px 3px 0 var(--brass-light);
}
.dialog-frame__sub {
  font-family: var(--pixel-en);
  font-size: 9px;
  color: var(--ink-soft);
  letter-spacing: 2px;
  margin: 0 0 28px;
}
.dialog-frame__field {
  display: block;
  margin-bottom: 18px;
  text-align: left;
}
.dialog-frame__label {
  display: block;
  margin-bottom: 8px;
  font-family: var(--pixel-en);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--brass-deep);
  text-transform: uppercase;
}
.dialog-frame__field input {
  width: 100%;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 18px;
  letter-spacing: 2px;
  background: var(--paper-soft);
  border: 2px solid var(--ink);
  color: var(--ink);
}
.dialog-frame__field input:focus {
  outline: none;
  background: white;
  box-shadow: 3px 3px 0 var(--brass-deep);
}
.dialog-frame__submit {
  font-family: var(--pixel-en);
  font-size: 12px;
  padding: 16px 18px;
  background: var(--ink);
  color: var(--paper);
  border: 2px solid var(--ink);
  cursor: pointer;
  letter-spacing: 3px;
  width: 100%;
  transition: all 0.15s;
  margin-top: 4px;
}
.dialog-frame__submit:hover:not(:disabled) {
  background: var(--brass-deep);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--brass-light);
}
.dialog-frame__submit:disabled {
  opacity: 0.6;
  cursor: wait;
}
.dialog-frame__hint {
  margin-top: 24px;
  border-top: 1px dashed var(--paper-edge);
  padding-top: 16px;
  text-align: left;
}
.dialog-frame__hint > summary {
  cursor: pointer;
  font-family: var(--pixel-en);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--brass-deep);
  text-transform: uppercase;
  list-style: none;
  padding: 4px 0;
}
.dialog-frame__hint > summary::-webkit-details-marker { display: none; }
.dialog-frame__hint > summary::before { content: "▶  "; color: var(--brass); }
.dialog-frame__hint[open] > summary::before { content: "▼  "; }
</style>
</head>
<body>

<header class="top-bar">
  <div class="left">
    <span class="logo">系統後台</span>
    <span class="badge" id="statusBadge">未登入</span>
  </div>
  <div>
    <a href="index.html">← 回前台</a>
    <button id="btnLogout" class="hidden">登出</button>
  </div>
</header>

<main class="wrap">

  <!-- ============ LOGIN SCENE — framed dialog ============ -->
  <section id="sceneLogin" class="hidden">
    <div class="dialog-frame">
      <span class="dialog-frame__deco" aria-hidden="true"></span>
      <h1 class="dialog-frame__title">系統登入</h1>
      <p class="dialog-frame__sub">mr-alleys</p>
      <form id="loginForm">
        <label class="dialog-frame__field">
          <span class="dialog-frame__label">PASSWORD</span>
          <input type="password" id="tokenInput" autocomplete="current-password" autofocus>
        </label>
        <button type="submit" id="btnLogin" class="dialog-frame__submit">▶ 登入</button>
        <div class="error hidden" id="loginErr"></div>
      </form>
    </div>
  </section>

  <!-- ============ EDITOR SCENE ============ -->
  <section id="sceneEditor" class="hidden">
    <h1>內容編輯</h1>
    <p class="lead">改完任一欄位 → 按底部「儲存到網站」。改動會 commit 到 GitHub，網站約 1-3 分鐘後自動更新。</p>
    <div id="loadingContent">讀取中...</div>
    <div id="editorBody" class="hidden"></div>
  </section>

</main>

<!-- Save bar -->
<div class="save-bar hidden" id="saveBar">
  <span id="saveInfo">沒有變更</span>
  <button id="btnSave" disabled>儲存到網站</button>
</div>

<script>
// =======================================================
// CONFIG
// =======================================================
const REPO_OWNER = 'okiijuuhyygt';
const REPO_NAME  = 'mr-alleys-site';
const CONTENT_PATH = 'content.json';
const LS_TOKEN = 'alleys-admin-token-v1';

// =======================================================
// UTILS
// =======================================================
const $ = (id) => document.getElementById(id);
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }
function setStatus(text) { $('statusBadge').textContent = text; }
function showScene(name) {
  ['sceneLogin', 'sceneEditor'].forEach(s => $(s).classList.add('hidden'));
  $(name).classList.remove('hidden');
  if (name === 'sceneEditor') $('saveBar').classList.remove('hidden');
  else $('saveBar').classList.add('hidden');
}
function getPath(obj, path) {
  return path.split('.').reduce((o, k) => {
    if (o == null) return o;
    const m = k.match(/^(\w+)\[(\d+)\]$/);
    if (m) return o[m[1]]?.[parseInt(m[2], 10)];
    return o[k];
  }, obj);
}
function setPath(obj, path, value) {
  const keys = path.split('.');
  const last = keys.pop();
  let target = obj;
  for (const k of keys) {
    const m = k.match(/^(\w+)\[(\d+)\]$/);
    if (m) {
      target[m[1]] = target[m[1]] || [];
      target = target[m[1]][parseInt(m[2], 10)] = target[m[1]][parseInt(m[2], 10)] || {};
    } else {
      target[k] = target[k] || {};
      target = target[k];
    }
  }
  const m = last.match(/^(\w+)\[(\d+)\]$/);
  if (m) {
    target[m[1]] = target[m[1]] || [];
    target[m[1]][parseInt(m[2], 10)] = value;
  } else {
    target[last] = value;
  }
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =======================================================
// ROUTER
// =======================================================
function route() {
  const token = localStorage.getItem(LS_TOKEN);
  if (token) {
    setStatus('已登入');
    $('btnLogout').classList.remove('hidden');
    showScene('sceneEditor');
    initEditor();
  } else {
    setStatus('未登入');
    $('btnLogout').classList.add('hidden');
    showScene('sceneLogin');
  }
}

// =======================================================
// LOGIN
// =======================================================
$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const tok = $('tokenInput').value.trim();
  const errEl = $('loginErr');
  const btn = $('btnLogin');
  errEl.classList.add('hidden');
  if (!tok) return;
  btn.disabled = true;
  btn.textContent = '驗證中...';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
      headers: { 'Authorization': `Bearer ${tok}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('auth-failed');
    localStorage.setItem(LS_TOKEN, tok);
    route();
  } catch {
    errEl.textContent = '密碼錯誤';
    errEl.classList.remove('hidden');
    $('tokenInput').value = '';
    $('tokenInput').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 登入';
  }
});

$('btnLogout').addEventListener('click', () => {
  if (!confirm('登出會清掉這台瀏覽器的 Token（GitHub 上的不受影響）。確定?')) return;
  localStorage.removeItem(LS_TOKEN);
  location.reload();
});

// =======================================================
// EDITOR
// =======================================================
let contentData = null;
let originalContent = null;

async function initEditor() {
  show('loadingContent');
  hide('editorBody');
  try {
    const res = await fetch(`content.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('找不到 content.json');
    contentData = await res.json();
    originalContent = JSON.stringify(contentData);
    renderEditor();
    hide('loadingContent');
    show('editorBody');
  } catch (e) {
    $('loadingContent').textContent = '讀取失敗:' + e.message;
  }
  updateSaveBar();
}

function bindInput(el, path, transform = (v) => v) {
  const cur = getPath(contentData, path);
  if (el.tagName === 'TEXTAREA' && Array.isArray(cur)) {
    el.value = cur.join('\n');
  } else {
    el.value = cur ?? '';
  }
  el.addEventListener('input', () => {
    let val = el.value;
    if (el.tagName === 'TEXTAREA' && Array.isArray(getPath(contentData, path))) {
      val = el.value.split('\n').filter(s => s.trim() !== '');
    }
    if (el.type === 'number') val = el.value === '' ? null : Number(el.value);
    setPath(contentData, path, transform(val));
    updateSaveBar();
  });
}

function bindSelect(el, path) {
  el.value = getPath(contentData, path) ?? '';
  el.addEventListener('change', () => {
    setPath(contentData, path, el.value);
    updateSaveBar();
  });
}

function renderEditor() {
  const body = $('editorBody');
  body.innerHTML = `

  <!-- META / BRAND -->
  <details class="panel" open>
    <summary>BRAND · 品牌資訊</summary>
    <div class="panel-body">
      <div class="field-row">
        <div class="field"><label>中文品牌</label><input type="text" data-path="meta.brandName"></div>
        <div class="field"><label>英文品牌</label><input type="text" data-path="meta.brandNameEn"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>標語(短)</label><input type="text" data-path="meta.tagline"></div>
        <div class="field"><label>副標語</label><input type="text" data-path="meta.subtagline"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>頂部代號</label><input type="text" data-path="meta.studioCode" placeholder="GUILD · 010"></div>
        <div class="field"><label>建立年份</label><input type="text" data-path="meta.established" placeholder="EST. 2020"></div>
      </div>
      <div class="field"><label>版本標記</label><input type="text" data-path="meta.version" placeholder="v0.3 · MVP"></div>
    </div>
  </details>

  <!-- HERO -->
  <details class="panel">
    <summary>HERO · 首屏</summary>
    <div class="panel-body">
      <div class="field">
        <label>GUILD BOARD 三行訊號（一行一條）</label>
        <textarea data-path="hero.consoleLines" rows="4"></textarea>
        <div class="hint">每行一條訊號，建議 3 行內。</div>
      </div>
      <div class="field-row">
        <div class="field"><label>主按鈕文字</label><input type="text" data-path="hero.ctaPrimary"></div>
        <div class="field"><label>次按鈕文字</label><input type="text" data-path="hero.ctaSecondary"></div>
      </div>
    </div>
  </details>

  <!-- SERVICES -->
  <details class="panel" open>
    <summary>SERVICES · 4 個服務 (重點區)</summary>
    <div class="panel-body" id="servicesEditor"></div>
  </details>

  <!-- SHOWCASE -->
  <details class="panel">
    <summary>SHOWCASE · 已完成作品</summary>
    <div class="panel-body">
      <div class="field"><label>標題</label><input type="text" data-path="showcase.headline"></div>
      <div class="field"><label>說明文字</label><input type="text" data-path="showcase.intro"><div class="hint">留空則 Spotify embed 上方不顯示文字。</div></div>
      <div class="field"><label>Spotify playlist ID</label><input type="text" data-path="showcase.spotifyPlaylistId" placeholder="4RXBEgeJiThrAK4wvNJMxf"><div class="hint">控制 embed iframe 顯示哪個 playlist。從 Spotify 分享連結 playlist/ 後面那串字就是 ID。</div></div>
      <div class="field"><label>完整 playlist URL（按鈕跳轉）</label><input type="text" data-path="showcase.playlistUrl"></div>
      <div class="field"><label>按鈕文字</label><input type="text" data-path="showcase.playlistLabel"></div>
    </div>
  </details>

  <!-- BGM (獨立 section、預設展開) -->
  <details class="panel" open>
    <summary>BGM · 背景音樂（節慶用）</summary>
    <div class="panel-body">
      <div class="field"><label>背景音樂模式</label>
        <select data-path="bgm.mode">
          <option value="off">無音樂（預設、平日用）</option>
          <option value="default">預設 8-bit（節慶用）</option>
          <option value="custom">自訂 URL</option>
        </select>
        <div class="hint">平日 off。節慶切「預設 8-bit」或「自訂 URL」→ 主站右下出現 ♪ button → 客戶 click 開。客戶滑到 Spotify 區會自動 mute。</div>
      </div>
      <div class="field">
        <label>上傳 BGM 檔（.mp3 / .wav / .ogg）</label>
        <input type="file" id="bgmFileInput" accept="audio/*">
        <button type="button" id="bgmUploadBtn" onclick="uploadBgmFile()" style="margin-top:8px;font-family:var(--pixel-en);font-size:11px;padding:10px 16px;background:var(--brass);color:var(--paper);border:2px solid var(--ink);cursor:pointer;box-shadow:3px 3px 0 var(--ink);">▶ 上傳並切自訂 mode</button>

function updateSaveBar() {

// =======================================================
// BGM FILE UPLOAD (admin → GitHub API PUT to assets/bgm/)
// =======================================================
window.uploadBgmFile = async function () {
  const fileInput = document.getElementById('bgmFileInput');
  const btn = document.getElementById('bgmUploadBtn');
  const file = fileInput && fileInput.files && fileInput.files[0];
  if (!file) { alert('先選檔案'); return; }

  const tok = localStorage.getItem(LS_TOKEN);
  if (!tok) { alert('請重新登入'); return; }

  const safeName = file.name.replace(/[^\w.-]/g, '_');
  const path = 'assets/bgm/' + safeName;

  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '上傳中...';

  try {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = '';
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    const b64 = btoa(binary);

    let sha = null;
    const checkRes = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path, {
      headers: { 'Authorization': 'Bearer ' + tok, 'Accept': 'application/vnd.github+json' }
    });
    if (checkRes.ok) {
      const data = await checkRes.json();
      sha = data.sha;
    }

    const body = { message: 'admin: upload BGM ' + safeName, content: b64 };
    if (sha) body.sha = sha;

    const putRes = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + tok,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) {
      const txt = await putRes.text();
      throw new Error('上傳失敗: ' + putRes.status + ' ' + txt.slice(0, 100));
    }

    contentData.bgm = contentData.bgm || {};
    contentData.bgm.customUrl = path;
    contentData.bgm.mode = 'custom';
    const cuInput = document.querySelector('input[data-path="bgm.customUrl"]');
    if (cuInput) cuInput.value = path;
    const modeSel = document.querySelector('select[data-path="bgm.mode"]');
    if (modeSel) modeSel.value = 'custom';
    if (typeof updateSaveBar === 'function') updateSaveBar();

    btn.textContent = '✓ 完成,按右下「儲存到網站」';
  } catch (e) {
    btn.textContent = '✗ ' + e.message;
  } finally {
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = origText;
      if (fileInput) fileInput.value = '';
    }, 6000);
  }
};

// =======================================================
// SAVE
// =======================================================
$('btnSave').addEventListener('click', async () => {
  const tok = localStorage.getItem(LS_TOKEN);
  if (!tok) { alert('請重新登入'); showScene('sceneLogin'); return; }
  $('btnSave').disabled = true;
  $('saveInfo').textContent = '儲存中...';
  try {
    // Re-fetch SHA in case it changed
    const shaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
      headers: { 'Authorization': `Bearer ${tok}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!shaRes.ok) throw new Error('讀取舊檔失敗:' + shaRes.status);
    const shaData = await shaRes.json();

    const json = JSON.stringify(contentData, null, 2);
    const b64 = btoa(unescape(encodeURIComponent(json)));

    const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${tok}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'admin: update content.json',
        content: b64,
        sha: shaData.sha
      })
    });
    if (!putRes.ok) {
      const txt = await putRes.text();
      throw new Error('寫入失敗:' + putRes.status + ' ' + txt.slice(0, 200));
    }
    originalContent = JSON.stringify(contentData);
    $('saveInfo').textContent = '✓ 已儲存！1-3 分鐘內網站會更新';
  } catch (e) {
    $('saveInfo').textContent = '✗ ' + e.message;
  } finally {
    updateSaveBar();
  }
});
