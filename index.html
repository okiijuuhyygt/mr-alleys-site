<script>
// Real visitor counter via abacus.jasoncameron.dev (free, no key).
// Hits once per browser, then only fetches total. Shows YOU=XXXX = your visit number.
(function () {
  var NS = 'hao-mr-alleys-site';
  var KEY = 'visits';
  var COUNTED = 'mr-alleys-counted';
  var MINE = 'mr-alleys-my-number';
  var fmt = function (n) { return (n % 10000).toString().padStart(4, '0'); };
  var numEl = document.getElementById('visitorCount');
  var youEl = document.getElementById('visitorYou');
  if (!numEl) return;

  var myNumber = localStorage.getItem(MINE);
  var endpoint = (localStorage.getItem(COUNTED) && myNumber)
    ? 'https://abacus.jasoncameron.dev/get/' + NS + '/' + KEY
    : 'https://abacus.jasoncameron.dev/hit/' + NS + '/' + KEY;

  fetch(endpoint).then(function (r) {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }).then(function (data) {
    var total = data.value;
    if (!localStorage.getItem(COUNTED)) {
      localStorage.setItem(COUNTED, '1');
      localStorage.setItem(MINE, String(total));
      myNumber = total;
    }
    rollNumber(numEl, total, fmt);
    if (myNumber && youEl) youEl.textContent = ' · YOU=' + fmt(Number(myNumber));
  }).catch(function () {
    if (numEl.firstChild) numEl.firstChild.nodeValue = '????';
    if (youEl) youEl.textContent = '';
  });

  function rollNumber(el, finalNum, formatter) {
    var duration = 900;
    var start = Date.now();
    function tick() {
      var t = Math.min(1, (Date.now() - start) / duration);
      var n = Math.floor(finalNum * (0.4 + 0.6 * t));
      if (el.childNodes[0]) el.childNodes[0].nodeValue = formatter(n);
      if (t < 1) requestAnimationFrame(tick);
      else if (el.childNodes[0]) el.childNodes[0].nodeValue = formatter(finalNum);
    }
    tick();
  }
})();
</script>
